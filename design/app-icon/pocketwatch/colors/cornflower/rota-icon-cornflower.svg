    <use xlink:href="#tick" transform="rotate(300 512 565)"/>
    <use xlink:href="#tick" transform="rotate(330 512 565)"/>
  </g>

  <!-- wordmark: r o t a, with the o as a gear -->
  <g transform="translate(512 565) scale(0.98) translate(-512 -563)">
    <g fill="none" stroke="#5B8DEF" stroke-width="30" stroke-linecap="round">
      <path d="M252 495 V632"/>
      <path d="M252 558 Q252 495 311 495"/>
      <circle cx="423" cy="563" r="56"/>
      <path d="M535 495 H607"/>
      <path d="M569 447 V598 Q569 632 603 632"/>
      <circle cx="711" cy="563" r="60"/>
      <path d="M771 495 V632"/>
    </g>
    <!-- gear teeth fused onto the o -->
    <g fill="#5B8DEF">
      <use xlink:href="#gtooth" transform="rotate(22.5 423 563)"/>
      <use xlink:href="#gtooth" transform="rotate(67.5 423 563)"/>
      <use xlink:href="#gtooth" transform="rotate(112.5 423 563)"/>
      <use xlink:href="#gtooth" transform="rotate(157.5 423 563)"/>
      <use xlink:href="#gtooth" transform="rotate(202.5 423 563)"/>
      <use xlink:href="#gtooth" transform="rotate(247.5 423 563)"/>
      <use xlink:href="#gtooth" transform="rotate(292.5 423 563)"/>
      <use xlink:href="#gtooth" transform="rotate(337.5 423 563)"/>
    </g>
    <!-- gear axle -->
    <circle cx="423" cy="563" r="9" fill="#8794A3"/>
  </g>
