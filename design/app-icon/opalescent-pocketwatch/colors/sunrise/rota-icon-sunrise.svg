<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>rota app icon — opalescent pocketwatch, sunrise</title>
  <desc>Pocket watch icon with layered cyan, blue, coral and orange waves filling the dial, a white rota wordmark with gear o, white notches, deep blue case with amber pinstripe, and a coral crown.</desc>
  <defs>
    <line id="tick" x1="512" y1="236.5" x2="512" y2="268.5"/>
    <rect id="gtooth" x="413" y="479" width="20" height="18" rx="5"/>
    <circle id="mdot" cx="512" cy="252.5" r="4"/>
  </defs>

  <!-- icon background -->
  <rect x="22" y="22" width="980" height="980" rx="224" fill="#FFFFFF" stroke="#E3E7EC" stroke-width="3"/>

  <!-- winding crown: coral knob, blue neck, amber collar -->
  <rect x="496" y="148" width="32" height="52" rx="6" fill="#36A3FF"/>
  <rect x="474" y="102" width="76" height="54" rx="16" fill="#FF6257"/>
  <path d="M497 116 V142 M512 116 V142 M527 116 V142" stroke="#C8483F" stroke-width="5" stroke-linecap="round" fill="none"/>
  <rect x="486" y="172" width="52" height="16" rx="8" fill="#FFA51E"/>

  <!-- dial: layered color waves, each path bounded by the face circle (no clipping needed) -->
  <circle cx="512" cy="565" r="334" fill="#C2EBFF"/>
  <path d="M223 398 A334 334 0 1 0 801 398 C660 450 360 360 223 398 Z" fill="#36A3FF"/>
  <path d="M238 757 A334 334 0 0 0 704 839 C560 690 380 660 238 757 Z" fill="#FF6257"/>
  <path d="M320 839 A334 334 0 0 0 599 888 C520 800 420 760 320 839 Z" fill="#FFA51E"/>

  <!-- minute-dot track, white -->
  <g fill="#FFFFFF" fill-opacity="0.5">
