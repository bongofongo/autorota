  <!-- case: amber pinstripe outer ring, deep blue main ring -->
  <circle cx="512" cy="565" r="368" fill="none" stroke="#FFB020" stroke-width="10"/>
  <circle cx="512" cy="565" r="346" fill="none" stroke="#1A5FD6" stroke-width="24"/>
