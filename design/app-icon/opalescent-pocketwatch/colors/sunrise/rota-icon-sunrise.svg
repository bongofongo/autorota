    <use xlink:href="#mdot" transform="rotate(246 512 565)"/>
    <use xlink:href="#mdot" transform="rotate(252 512 565)"/>
    <use xlink:href="#mdot" transform="rotate(258 512 565)"/>
    <use xlink:href="#mdot" transform="rotate(264 512 565)"/>
