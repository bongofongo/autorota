  <!-- faint chapter ring, white -->
  <circle cx="512" cy="565" r="288" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="5"/>

  <!-- hour notches, white (behind the word) -->
  <g stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="11" stroke-linecap="round">
