    <use xlink:href="#mdot" transform="rotate(6 512 565)"/>
    <use xlink:href="#mdot" transform="rotate(12 512 565)"/>
    <use xlink:href="#mdot" transform="rotate(18 512 565)"/>
    <use xlink:href="#mdot" transform="rotate(24 512 565)"/>
