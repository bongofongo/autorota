name: Perf

# Never blocks merge — both jobs use continue-on-error. Artifacts are uploaded
# for manual inspection and a short bencher-format summary is written to the
# GitHub job summary. The rust-bench job additionally runs a *soft* regression
# gate on the scheduler engine (base vs PR on the same runner): a statistically
# significant slowdown turns the check red and adds a warning annotation, but
# does not block merge. See docs/perf-testing.md for how to read the output.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-bench:
    name: Rust criterion
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: perf-rust

      - name: Run benches (bencher format)
        # --benches: without it the lib target's libtest harness also runs and
        # rejects criterion's --output-format flag (exit 101).
        run: |
          set -o pipefail
          cargo bench -p autorota-core --benches -- --output-format bencher \
            | tee bench-output.txt
          {
            echo '## Rust criterion (bencher format)'
            echo
            echo '```'
            cat bench-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Soft regression gate on the scheduler engine. Benches the PR's merge base
      # and the PR head on the *same* runner (so absolute timings are comparable,
      # neutralising machine variance) and lets criterion's own statistical
      # comparison flag a regression. This job is continue-on-error, so a non-zero
      # exit surfaces a red check + warning annotation without blocking merge.
      - name: Scheduler regression check (base vs PR)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -o pipefail
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          git checkout -q FETCH_HEAD
          cargo bench -p autorota-core --bench scheduler -- --save-baseline base >/dev/null 2>&1
          git checkout -q "$HEAD_SHA"
          cargo bench -p autorota-core --bench scheduler -- --baseline base | tee cmp.txt
          if grep -q "Performance has regressed" cmp.txt; then
            echo "::warning::Scheduler bench regressed vs $BASE_REF (statistically significant, p<0.05). Review the criterion-html artifact or cmp.txt."
            exit 1
          fi
          echo "No scheduler regression vs $BASE_REF."

      - name: Upload criterion HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-html
          path: target/criterion/
          retention-days: 14

      - name: Upload bencher-format summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-bencher
          path: bench-output.txt
          retention-days: 14

  swift-perf:
    name: Swift XCUITest perf (iOS Simulator)
    # Sim runs on shared runners are too noisy for per-PR signal, and the
    # scheme's Perf test plan association lands with the perf-testing
    # overhaul branch — manual dispatch only until then.
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin
            x86_64-apple-darwin
            aarch64-apple-ios
            aarch64-apple-ios-sim

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: perf-apple

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build XCFramework with PERF_HELPERS=1
        run: PERF_HELPERS=1 bash scripts/build_xcframework.sh

      - name: Run perf tests (iOS Simulator)
        # XCUITest on macOS hosts requires interactive TCC (Accessibility)
        # grants that CI runners can't provide. iOS Simulator runs under
        # simctl with no TCC dependency. The perf target may not yet exist
        # in the project on a given branch (one-time Xcode setup is
        # documented in docs/perf-testing.md). If it is missing, this step
        # exits 0 with a note rather than failing CI.
        run: |
          PROJ=platforms/apple/Apps/AutorotaApp/AutorotaApp.xcodeproj
          if xcodebuild -project "$PROJ" -list 2>/dev/null | grep -q AutorotaAppPerfTests; then
            xcodebuild test \
              -project "$PROJ" \
              -scheme AutorotaApp \
              -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max' \
              -testPlan Perf -only-testing:AutorotaAppPerfTests \
              SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) PERF_HELPERS' \
              -resultBundlePath perf-results.xcresult \
              CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          else
            echo "::notice::AutorotaAppPerfTests target not yet configured — see docs/perf-testing.md"
          fi

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: swift-perf-xcresult
          path: perf-results.xcresult
          if-no-files-found: ignore
          retention-days: 14
