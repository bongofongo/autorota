name: Perf

# Report-only: no job here ever blocks merge (continue-on-error everywhere) and
# no step exits non-zero on a regression. Numbers land in the job summary and
# artifacts; humans (or Claude) read them via docs/perf-runbook.md.
#
# Per-PR:      rust-bench (criterion + soft same-runner base-vs-head compare)
#              kit-perf   (FFI hot-path suite, no simulator)
# Weekly/main: swift-perf (XCUITest launch/render/nav on iOS Simulator) — too
#              sim-flaky for per-PR signal; scheduled runs give trend data.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  schedule:
    # Mondays 05:00 UTC on main — weekly XCUITest trend point.
    - cron: '0 5 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-bench:
    name: Rust criterion
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: perf-rust

      - name: Run benches (bencher format)
        run: |
          set -o pipefail
          cargo bench -p autorota-core -- --output-format bencher \
            | tee bench-output.txt
          {
            echo '## Rust criterion (bencher format)'
            echo
            echo '```'
            cat bench-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Soft comparison on the scheduler engine: bench the PR's merge base and
      # head on the *same* runner (machine variance cancels out) and let
      # criterion's statistical test flag movement. Annotation only — a
      # statistically significant slowdown is a message, never a failure.
      - name: Scheduler comparison (base vs PR)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -o pipefail
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          git checkout -q FETCH_HEAD
          cargo bench -p autorota-core --bench scheduler -- --save-baseline base >/dev/null 2>&1
          git checkout -q "$HEAD_SHA"
          cargo bench -p autorota-core --bench scheduler -- --baseline base | tee cmp.txt
          if grep -q "Performance has regressed" cmp.txt; then
            echo "::warning::Scheduler bench moved vs $BASE_REF (statistically significant, p<0.05). Informational — review the criterion-html artifact or cmp.txt."
          else
            echo "No scheduler regression vs $BASE_REF."
          fi

      - name: Upload criterion HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-html
          path: target/criterion/
          retention-days: 14

      - name: Upload bencher-format summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-bencher
          path: bench-output.txt
          retention-days: 14

  kit-perf:
    name: Kit FFI perf (macOS, no simulator)
    if: github.event_name != 'schedule'
    runs-on: macos-26
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin
            x86_64-apple-darwin
            aarch64-apple-ios
            aarch64-apple-ios-sim

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: perf-kit

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Release build: debug-Rust timings are meaningless (docs/perf-testing.md).
      - name: Build XCFramework (release, PERF_HELPERS=1)
        run: make kit-perf-xcframework

      - name: Run Kit FFI perf suite
        run: make kit-perf

      - name: Perf report to job summary
        if: always()
        run: |
          python3 scripts/perf_report.py >> "$GITHUB_STEP_SUMMARY"

      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kit-perf-report
          path: |
            perf-report.md
            perf-report.json
            platforms/apple/AutorotaKit/.build/kit-perf.txt
          if-no-files-found: ignore
          retention-days: 14

  swift-perf:
    name: Swift XCUITest perf (iOS Simulator)
    # Sim runs on shared runners are too noisy for per-PR signal — weekly
    # schedule + manual dispatch only, for trend data.
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin
            x86_64-apple-darwin
            aarch64-apple-ios
            aarch64-apple-ios-sim

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: perf-apple

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build XCFramework with PERF_HELPERS=1
        run: PERF_HELPERS=1 bash scripts/build_xcframework.sh

      # XCUITest on macOS hosts requires interactive TCC (Accessibility)
      # grants CI runners can't provide; the iOS Simulator runs under simctl
      # with no TCC dependency.
      - name: Run perf tests (iOS Simulator)
        run: |
          xcodebuild test \
            -project platforms/apple/Apps/AutorotaApp/AutorotaApp.xcodeproj \
            -scheme AutorotaApp \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max' \
            -testPlan Perf -only-testing:AutorotaAppPerfTests \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) PERF_HELPERS' \
            -resultBundlePath perf-results.xcresult \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Perf report to job summary
        if: always()
        run: |
          python3 scripts/perf_report.py --xcresult perf-results.xcresult \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: swift-perf-xcresult
          path: perf-results.xcresult
          if-no-files-found: ignore
          retention-days: 14
