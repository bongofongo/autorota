name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release
  cancel-in-progress: false

jobs:

  # ─── Parse tag → version + build number ───────────────────────────────────
  tag-parse:
    name: Parse tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      build_number: ${{ github.run_number }}
    steps:
      - name: Parse version from tag
        id: parse
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/v}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must match vX.Y.Z (semver). Got: v$TAG"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  # ─── Rust checks (reusable) ────────────────────────────────────────────────
  rust-checks:
    name: Rust
    uses: ./.github/workflows/rust-checks.yml

  # ─── iOS: archive → TestFlight ─────────────────────────────────────────────
  release-ios:
    name: iOS → TestFlight
    runs-on: macos-26
    needs: [tag-parse, rust-checks]
    env:
      VERSION: ${{ needs.tag-parse.outputs.version }}
      BUILD_NUMBER: ${{ needs.tag-parse.outputs.build_number }}
      PROJECT: platforms/apple/Apps/AutorotaApp/AutorotaApp.xcodeproj
      SCHEME: AutorotaApp
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin
            x86_64-apple-darwin
            aarch64-apple-ios
            aarch64-apple-ios-sim

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: apple-release

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build XCFramework (release)
        run: bash scripts/build_xcframework.sh

      - name: Set version in Xcode project
        run: |
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = $VERSION;/g" \
            "$PROJECT/project.pbxproj"
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" \
            "$PROJECT/project.pbxproj"

      - name: Install App Store Connect API key
        env:
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY_P8" | base64 --decode > ~/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Archive (iOS)
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/AutorotaApp-iOS.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

      - name: Export IPA
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AutorotaApp-iOS.xcarchive" \
            -exportOptionsPlist platforms/apple/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export-ios" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

      - name: Upload iOS build to TestFlight
        uses: Apple-Actions/upload-testflight-build@v3
        with:
          app-path: ${{ runner.temp }}/export-ios/AutorotaApp.ipa
          app-type: ios
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-issuer: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}

      # CI-built archives vanish with the runner — keep the dSYMs or crash
      # reports from this build are unsymbolicatable forever.
      - name: Collect dSYMs
        run: |
          cd "$RUNNER_TEMP/AutorotaApp-iOS.xcarchive"
          zip -r "$RUNNER_TEMP/dSYMs-ios-v$VERSION.zip" dSYMs

      - name: Upload dSYMs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dSYMs-ios-v${{ env.VERSION }}
          path: ${{ runner.temp }}/dSYMs-ios-v${{ env.VERSION }}.zip
          retention-days: 90

      - name: Cleanup API key
        if: always()
        run: rm -rf ~/private_keys

  # ─── macOS: shelved (2026-07-17) ───────────────────────────────────────────
  # The release-macos job (Mac App Store TestFlight upload + notarized .dmg)
  # was removed while there is no macOS app record in App Store Connect and
  # macOS is not being shipped. Restore it from git history (last present at
  # tag-time commit 29aab38) when macOS distribution resumes; it also fed the
  # .dmg into the publish job and dSYMs-macos artifact, and belongs back in
  # the publish/notify-failure `needs` lists.

  # ─── Publish GitHub Release ────────────────────────────────────────────────
  # No artifacts attached while macOS (.dmg) is shelved — the release exists
  # for the tag + auto-generated notes; iOS ships via TestFlight.
  publish:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [tag-parse, release-ios]
    env:
      VERSION: ${{ needs.tag-parse.outputs.version }}
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false

  # ─── File an issue if anything failed ──────────────────────────────────────
  # A release that half-ships (e.g. iOS uploaded, macOS failed) is otherwise
  # only visible as a red check in the Actions tab. An auto-filed issue is the
  # lightest notification that actually gets seen.
  notify-failure:
    name: File issue on failure
    runs-on: ubuntu-latest
    needs: [tag-parse, rust-checks, release-ios, publish]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: File tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release ${tag} failed`,
              body: [
                `The release pipeline for \`${tag}\` failed part-way.`,
                '',
                `Run: ${runUrl}`,
                '',
                'Check which jobs failed — if one platform uploaded to TestFlight',
                'before the failure, the release is half-shipped and needs manual',
                'attention (finish it or pull the uploaded build).',
              ].join('\n'),
            });
