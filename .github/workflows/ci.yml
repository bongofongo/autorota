name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Rust: fmt + clippy + tests (reusable) ──────────────────────────────────
  rust-checks:
    name: Rust
    uses: ./.github/workflows/rust-checks.yml

  # ─── Build XCFramework once, share with Swift package tests ────────────────
  xcframework:
    name: Build XCFramework
    runs-on: macos-26
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin
            x86_64-apple-darwin
            aarch64-apple-ios
            aarch64-apple-ios-sim

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: apple

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # PERF_HELPERS=1: the app's Debug config compiles with the PERF_HELPERS
      # condition (pbxproj), so Debug builds link seedPerfCorpus — a plain
      # framework fails at link. Release ships its own plain build in release.yml.
      - name: Build XCFramework
        run: PERF_HELPERS=1 bash scripts/build_xcframework.sh

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcframework
          path: platforms/apple/AutorotaKit/XCFrameworks/
          retention-days: 1

      - name: Upload generated bindings
        uses: actions/upload-artifact@v4
        with:
          name: generated-bindings
          path: platforms/apple/AutorotaKit/Sources/AutorotaKit/generated/
          retention-days: 1

  # ─── Swift: ViewModel unit tests (mock service, no XCFramework needed) ─────
  # NOTE: Requires Xcode 26+ (Swift 6.2 / iOS 26 SDK).
  swift-app-tests:
    name: Swift ViewModel — ${{ matrix.platform }}
    runs-on: macos-26
    needs: rust-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            destination: platform=macOS
          - platform: iOS
            destination: platform=iOS Simulator,name=iPhone 17
          - platform: iPadOS
            destination: platform=iOS Simulator,name=iPad Pro 13-inch (M5)

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Test — ${{ matrix.platform }}
        env:
          DESTINATION: ${{ matrix.destination }}
        run: |
          xcodebuild test \
            -project platforms/apple/Apps/AutorotaApp/AutorotaApp.xcodeproj \
            -scheme AutorotaApp \
            -destination "$DESTINATION"

  # ─── Swift: small-screen compile check (iPhone SE) ──────────────────────────
  # Compile-only on iPhone SE so layouts that overflow at 4.7"/375pt-wide are
  # caught at PR time. Doesn't run tests (the iPhone 17 leg above already
  # exercises behaviour) so the extra cost is just one compilation, not a
  # second simulator boot for the full suite.
  swift-iphone-se-compile:
    name: Swift compile — iPhone SE
    runs-on: macos-26
    needs: xcframework

    steps:
      - uses: actions/checkout@v4

      - name: Download XCFramework
        uses: actions/download-artifact@v4
        with:
          name: xcframework
          path: platforms/apple/AutorotaKit/XCFrameworks/

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: generated-bindings
          path: platforms/apple/AutorotaKit/Sources/AutorotaKit/generated/

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build — iPhone SE (3rd generation)
        run: |
          xcodebuild build \
            -project platforms/apple/Apps/AutorotaApp/AutorotaApp.xcodeproj \
            -scheme AutorotaApp \
            -destination 'platform=iOS Simulator,name=iPhone SE (3rd generation)' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

  # ─── Swift: AutorotaKit SPM integration tests (real FFI) ────────────────────
  swift-package-tests:
    name: Swift Package Integration
    runs-on: macos-26
    needs: xcframework

    steps:
      - uses: actions/checkout@v4

      - name: Download XCFramework
        uses: actions/download-artifact@v4
        with:
          name: xcframework
          path: platforms/apple/AutorotaKit/XCFrameworks/

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: generated-bindings
          path: platforms/apple/AutorotaKit/Sources/AutorotaKit/generated/

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Test AutorotaKit package
        run: cd platforms/apple/AutorotaKit && swift test

  # ─── Swift: compile-check matrix (catches breaks in non-test files) ────────
  # Faster than swift-app-tests; covers files no XCTest imports.
  # Inputs are author-controlled matrix values, no PR-injected strings used.
  swift-compile-check:
    name: Swift Compile — ${{ matrix.platform }}
    runs-on: macos-26
    needs: xcframework
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            target: macos
          - platform: iOS
            target: ios
          - platform: iPadOS
            target: ipad

    steps:
      - uses: actions/checkout@v4

      - name: Download XCFramework
        uses: actions/download-artifact@v4
        with:
          name: xcframework
          path: platforms/apple/AutorotaKit/XCFrameworks/

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: generated-bindings
          path: platforms/apple/AutorotaKit/Sources/AutorotaKit/generated/

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Compile-check
        env:
          TARGET: ${{ matrix.target }}
        run: make swift-build-check-"$TARGET"

  # Tauri desktop (app-desktop) is deliberately NOT checked in CI: the desktop
  # app isn't in production and currently doesn't compile on clean main.
  # Check locally with: cargo check -p app-desktop
