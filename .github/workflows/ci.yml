name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Rust: fmt + clippy + tests (reusable) ──────────────────────────────────
  rust-checks:
    name: Rust
    uses: ./.github/workflows/rust-checks.yml

  # ─── Build XCFramework once, share with Swift package tests ────────────────
  xcframework:
    name: Build XCFramework
    runs-on: macos-15
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin
            x86_64-apple-darwin
            aarch64-apple-ios
            aarch64-apple-ios-sim

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: apple

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Build XCFramework
        run: bash scripts/build_xcframework.sh

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcframework
          path: platforms/apple/AutorotaKit/XCFrameworks/
          retention-days: 1

      - name: Upload generated bindings
        uses: actions/upload-artifact@v4
        with:
          name: generated-bindings
          path: platforms/apple/AutorotaKit/Sources/AutorotaKit/generated/
          retention-days: 1

  # ─── Swift: ViewModel unit tests (mock service, no XCFramework needed) ─────
  # NOTE: Requires Xcode 26+ (Swift 6.2 / iOS 26 SDK).
  swift-app-tests:
    name: Swift ViewModel — ${{ matrix.platform }}
    runs-on: macos-15
    needs: rust-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            destination: platform=macOS
          - platform: iOS
            destination: platform=iOS Simulator,name=iPhone 17
          - platform: iPadOS
            destination: platform=iOS Simulator,name=iPad Pro 13-inch (M5)

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Test — ${{ matrix.platform }}
        env:
          DESTINATION: ${{ matrix.destination }}
        run: |
          xcodebuild test \
            -project platforms/apple/Apps/AutorotaApp/AutorotaApp.xcodeproj \
            -scheme AutorotaApp \
            -destination "$DESTINATION"

  # ─── Swift: AutorotaKit SPM integration tests (real FFI) ────────────────────
  swift-package-tests:
    name: Swift Package Integration
    runs-on: macos-15
    needs: xcframework

    steps:
      - uses: actions/checkout@v4

      - name: Download XCFramework
        uses: actions/download-artifact@v4
        with:
          name: xcframework
          path: platforms/apple/AutorotaKit/XCFrameworks/

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: generated-bindings
          path: platforms/apple/AutorotaKit/Sources/AutorotaKit/generated/

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Test AutorotaKit package
        run: cd platforms/apple/AutorotaKit && swift test

  # ─── Tauri desktop: compile verification on macOS ──────────────────────────
  tauri-desktop:
    name: Tauri Desktop (macOS)
    runs-on: macos-15
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-macos
          workspaces: crates/app-desktop/src-tauri

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crates/app-desktop/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: crates/app-desktop

      - name: Build frontend
        run: npm run build
        working-directory: crates/app-desktop

      - name: Cargo check app-desktop
        run: cargo check -p app-desktop
