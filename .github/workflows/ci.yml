name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Rust: fmt + clippy + tests (reusable) ──────────────────────────────────
  rust-checks:
    name: Rust
    uses: ./.github/workflows/rust-checks.yml

  # ─── Build XCFramework once, share with Swift package tests ────────────────
  xcframework:
    name: Build XCFramework
    runs-on: macos-26
    needs: rust-checks
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin
            x86_64-apple-darwin
            aarch64-apple-ios
            aarch64-apple-ios-sim

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: apple

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # PERF_HELPERS=1: the app's Debug config compiles with the PERF_HELPERS
      # condition (pbxproj), so Debug builds link seedPerfCorpus — a plain
      # framework fails at link. Release ships its own plain build in release.yml.
      - name: Build XCFramework
        run: PERF_HELPERS=1 bash scripts/build_xcframework.sh

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v7
        with:
          name: xcframework
          path: platforms/apple/AutorotaKit/XCFrameworks/
          retention-days: 1

      - name: Upload generated bindings
        uses: actions/upload-artifact@v7
        with:
          name: generated-bindings
          path: platforms/apple/AutorotaKit/Sources/AutorotaKit/generated/
          retention-days: 1

  # ─── Swift: ViewModel unit tests (macOS host; MockAutorotaService) ─────────
  # Restored 2026-07-20: the shelving cause (XCUITest perf runner booting — and
  # crashing — during plain `xcodebuild test`) is fixed by the scheme's default
  # AutorotaApp.xctestplan, which contains AutorotaAppTests only. macOS
  # destination only: the suite is host-agnostic ViewModel logic, and one
  # destination keeps CI minutes down (compile breakage per-platform is caught
  # by swift-compile-check).
  swift-app-tests:
    name: Swift ViewModel Tests
    runs-on: macos-26
    needs: xcframework

    steps:
      - uses: actions/checkout@v7

      - name: Download XCFramework
        uses: actions/download-artifact@v8
        with:
          name: xcframework
          path: platforms/apple/AutorotaKit/XCFrameworks/

      - name: Download generated bindings
        uses: actions/download-artifact@v8
        with:
          name: generated-bindings
          path: platforms/apple/AutorotaKit/Sources/AutorotaKit/generated/

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run ViewModel tests (macOS)
        run: make swift-test-app-macos

  # The former "Swift compile — iPhone SE" job was removed: compile-only builds
  # are destination-independent, so it duplicated Swift Compile — iOS exactly
  # (a build can't catch 375pt layout overflow — that needs a UI test), and no
  # iOS 26 simulator runtime pairs with the SE (3rd gen) device type anyway.

  # ─── Swift: AutorotaKit SPM integration tests (real FFI) ────────────────────
  swift-package-tests:
    name: Swift Package Integration
    runs-on: macos-26
    needs: xcframework

    steps:
      - uses: actions/checkout@v7

      - name: Download XCFramework
        uses: actions/download-artifact@v8
        with:
          name: xcframework
          path: platforms/apple/AutorotaKit/XCFrameworks/

      - name: Download generated bindings
        uses: actions/download-artifact@v8
        with:
          name: generated-bindings
          path: platforms/apple/AutorotaKit/Sources/AutorotaKit/generated/

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Test AutorotaKit package
        # Perf suite excluded: timings belong to perf.yml, not the merge gate.
        run: cd platforms/apple/AutorotaKit && swift test --skip AutorotaKitPerfTests

  # ─── Swift: compile-check matrix (catches breaks in non-test files) ────────
  # Faster than swift-app-tests; covers files no XCTest imports.
  # Inputs are author-controlled matrix values, no PR-injected strings used.
  swift-compile-check:
    name: Swift Compile — ${{ matrix.platform }}
    runs-on: macos-26
    needs: xcframework
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            target: macos
          - platform: iOS
            target: ios
          - platform: iPadOS
            target: ipad

    steps:
      - uses: actions/checkout@v7

      - name: Download XCFramework
        uses: actions/download-artifact@v8
        with:
          name: xcframework
          path: platforms/apple/AutorotaKit/XCFrameworks/

      - name: Download generated bindings
        uses: actions/download-artifact@v8
        with:
          name: generated-bindings
          path: platforms/apple/AutorotaKit/Sources/AutorotaKit/generated/

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Compile-check
        env:
          TARGET: ${{ matrix.target }}
        run: make swift-build-check-"$TARGET"

  # Tauri desktop (app-desktop) is deliberately NOT checked in CI: the desktop
  # app isn't in production and currently doesn't compile on clean main.
  # Check locally with: cargo check -p app-desktop
