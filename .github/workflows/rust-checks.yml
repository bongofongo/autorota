name: Rust Checks

on:
  workflow_call:

jobs:
  rust:
    name: fmt + clippy + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check --all

      # app-desktop (Tauri) is excluded: on Linux it needs GTK/glib system
      # libs that aren't installed here, and it has its own dedicated
      # compile-check job on macOS in ci.yml.
      - name: Clippy
        run: cargo clippy --workspace --exclude app-desktop -- -D warnings

      - name: Unit tests
        run: cargo test --lib --workspace --exclude app-desktop

      - name: Integration tests
        run: cargo test --test '*' -p autorota-core
