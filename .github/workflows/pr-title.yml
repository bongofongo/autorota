name: pr-title

# Lints PR title against Conventional Commits.
# Squash-merge -> PR title becomes the commit message -> release-plz parses it
# for changelog grouping. Bad titles break the changelog, so gate them here.
#
# This workflow does NOT execute any PR-controlled string in shell;
# the action consumes the title via the GitHub API directly.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Conventional Commit
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            PR subject must start lowercase.
            Example: "feat(scheduler): add fairness tiebreak"
