name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Don't run twice on rapid pushes.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Use PAT/App token so tag push can trigger release.yml.
          # GITHUB_TOKEN-pushed tags do NOT fire downstream workflows.
          # If RELEASE_PLZ_TOKEN secret is unset, falls back to GITHUB_TOKEN
          # (release PR still works; tag push just won't auto-trigger release.yml —
          # operator can re-push the tag manually).
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
