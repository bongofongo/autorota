# lefthook — opt-in local git hooks.
# Install: `make install-hooks` (requires `brew install lefthook` first).
# Uninstall: `lefthook uninstall`.
# Skip a single commit: `LEFTHOOK=0 git commit ...`.

pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: "*.rs"
      run: cargo fmt --check -- {staged_files}
      stage_fixed: false
    rust-clippy:
      glob: "crates/**/*.rs"
      # Workspace-wide; staged-file scoping is unreliable for clippy
      # because lints depend on the whole crate graph.
      run: cargo clippy --workspace --all-targets -- -D warnings

pre-push:
  commands:
    swift-compile:
      # Only run if Swift files changed in the push.
      glob: "platforms/apple/**/*.swift"
      # macOS-only; runs the Make target that does compile-check on all 3 platforms.
      run: make swift-build-check
    swift-test-macos:
      # ViewModel unit tests against MockAutorotaService — no XCFramework needed
      # and no simulator boot, so the cost is bounded (~30-60s warm). Runs only
      # when ViewModels / services / tests change so trivial UI tweaks aren't
      # gated on the test suite.
      glob:
        - "platforms/apple/Apps/AutorotaApp/ViewModels/**/*.swift"
        - "platforms/apple/Apps/AutorotaApp/Services/**/*.swift"
        - "platforms/apple/Apps/AutorotaApp/AutorotaAppTests/**/*.swift"
      run: make swift-test-app-macos
